@if(t3dataform) {

<div class="d-flex flex-column">

  <div class="d-flex flex-row">
    <div>
      Data Inputs to Rules
    </div>
    <div>
   <button class="btn btn-sm btn-success mb-2 ms-5" (click)="patch()">Patch</button>
    </div>
  </div>

  <div>


    <!-- Wrap it in the form group or add it to an existing container -->
    <div [formGroup]="t3dataform">
      <mat-form-field>
        <mat-label>Data Values</mat-label>
        <!-- Use formControlName instead of ngModel -->
        <textarea matInput rows="20" cols=" 40"class="form-control mb-2" formControlName="current"></textarea>
      </mat-form-field>
    </div>

    
  

  </div>

</div>
}
